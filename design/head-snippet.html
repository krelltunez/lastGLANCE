<!--
  lastGLANCE — HTML head snippet
  Drop into your <head> after adjusting the file paths to match your hosting.
-->

<!-- Theme color (matches manifest, sets browser chrome color) -->
<meta name="theme-color" content="#05081A">
<meta name="color-scheme" content="dark">

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48.png">

<!-- Apple touch icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json">

<!-- Open Graph / Twitter -->
<meta property="og:type" content="website">
<meta property="og:title" content="lastGLANCE">
<meta property="og:description" content="When did you last...? A last-done tracker for the things that matter. No deadlines, no nagging, just information.">
<meta property="og:image" content="/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="lastGLANCE">
<meta name="twitter:description" content="When did you last...? A last-done tracker for the things that matter.">
<meta name="twitter:image" content="/og-image.png">
